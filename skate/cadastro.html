<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro do Skatista</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Radical Queiroz Skate Shop</h1>
        <nav>
            <a href="index.html">Home</a>  
            <a href="conteudo.html">Cultura</a>  
            <a href="dados.html">Produtos</a>  
            <a href="cadastro.html">Cadastro</a>
        </nav>
    </header>

    <main>
        <h2>Faça seu Cadastro na Comunidade</h2>
        <p>Receba cupons de desconto e novidades sobre eventos e campeonatos locais.</p>

        <form id="formCadastro">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" required placeholder="Digite seu nome">

            <label for="email">E-mail:</label>
            <input type="email" id="email" required placeholder="seuemail@exemplo.com">

            <label for="telefone">Telefone:</label>
            <input type="tel" id="telefone" placeholder="(00) 99999-9999">

            <label for="idade">Idade:</label>
            <input type="number" id="idade" min="5" max="100">

            <label for="modalidade">Sua Modalidade Favorita:</label>
            <select id="modalidade">
                <option value="street">Street</option>
                <option value="park">Park</option>
                <option value="vert">Vertical / Downhill</option>
            </select>

            <button type="submit">Enviar Cadastro</button>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 Radical Queiroz Skate Shop. Desenvolvido por Queiroz.</p>
    </footer>

    
    <script src="script.js"></script>
</body>
</html>
